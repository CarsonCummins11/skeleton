name: Plan and Deploy Terraform

permissions:
  contents: read
  issues: write
  pull-requests: write

on:
  push:
    branches: [main]
    paths: ["tf/**"]

  pull_request:
    branches: [main]
    paths: ["tf/**"]

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Plan
        run: |
          cd tf
          terraform init
          terraform plan -no-color > ../plan.out

      - name: Comment TF plan output
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('plan.out', 'utf8');
            const [, ...rest] = raw.split(/\r?\n\r?\n/);
            const cleaned = rest.join('\n\n').slice(0, 65000);

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📖 **Terraform Plan Output**\n\n${cleaned}`
            });

  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Initialise and Deploy Terraform
        run: |
          cd tf
          terraform fmt
          terraform init
          terraform apply -auto-approve
